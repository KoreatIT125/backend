spring:
  application:
    name: disaster-safety-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/safety_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
server:
  port: 8080

logging:
  level:
    com.disaster.safety: DEBUG
